<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟炒股助手 · 登录</title>
<style>
  :root {
    --red: #e63946;
    --green: #2a9d8f;
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f79239;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: -apple-system, "PingFang SC", sans-serif; 
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .login-container {
    width: 100%;
    max-width: 400px;
  }
  
  .login-header {
    text-align: center;
    margin-bottom: 32px;
  }
  
  .login-header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  .login-header h1 span {
    color: var(--accent);
  }
  
  .login-header p {
    color: var(--muted);
    font-size: 14px;
  }
  
  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }
  
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  
  .tab:hover {
    color: var(--text);
  }
  
  .tab.active {
    color: var(--accent);
  }
  
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--accent);
  }
  
  .form-group {
    margin-bottom: 20px;
  }
  
  .form-group label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  
  .form-control {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    transition: border-color 0.2s;
  }
  
  .form-control:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .btn {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  
  .btn-primary:hover {
    background: #e68535;
  }
  
  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }
  
  .btn-secondary:hover {
    background: #444950;
  }
  
  .error-message {
    background: rgba(230, 57, 70, 0.1);
    border: 1px solid rgba(230, 57, 70, 0.3);
    color: var(--red);
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    display: none;
  }
  
  .success-message {
    background: rgba(42, 157, 143, 0.1);
    border: 1px solid rgba(42, 157, 143, 0.3);
    color: var(--green);
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    display: none;
  }
  
  .loading {
    opacity: 0.7;
    pointer-events: none;
  }
  
  .loading::after {
    content: '...';
    animation: dots 1.5s infinite;
  }
  
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>模拟炒股<span>助手</span></h1>
      <p>中线策略 · 量化选股 · 模拟交易</p>
    </div>
    
    <div class="login-card">
      <div class="tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      
      <div id="login-form">
        <div class="error-message" id="login-error"></div>
        <div class="success-message" id="login-success"></div>
        
        <div class="form-group">
          <label for="login-username">用户名</label>
          <input type="text" id="login-username" class="form-control" placeholder="请输入用户名" required>
        </div>
        
        <div class="form-group">
          <label for="login-password">密码</label>
          <input type="password" id="login-password" class="form-control" placeholder="请输入密码" required>
        </div>
        
        <button class="btn btn-primary" id="login-btn" onclick="login()">登录</button>
      </div>
      
      <div id="register-form" style="display: none;">
        <div class="error-message" id="register-error"></div>
        <div class="success-message" id="register-success"></div>
        
        <div class="form-group">
          <label for="register-username">用户名</label>
          <input type="text" id="register-username" class="form-control" placeholder="3-20个字符" required>
          <small style="color: var(--muted); font-size: 12px; margin-top: 4px; display: block;">
            建议使用英文、数字或下划线
          </small>
        </div>
        
        <div class="form-group">
          <label for="register-password">密码</label>
          <input type="password" id="register-password" class="form-control" placeholder="至少6位" required>
        </div>
        
        <div class="form-group">
          <label for="register-confirm">确认密码</label>
          <input type="password" id="register-confirm" class="form-control" placeholder="再次输入密码" required>
        </div>
        
        <button class="btn btn-primary" id="register-btn" onclick="register()">注册</button>
      </div>
      
      <div style="text-align: center; margin-top: 24px;">
        <p style="color: var(--muted); font-size: 12px;">
          无需真实资金，体验量化投资策略<br>
          建议代码：仅用于技术学习与模拟交易
        </p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let currentTab = 'login';
    
    // Tab切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        const tabId = this.dataset.tab;
        
        // 更新Tab样式
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        
        // 切换表单
        if (tabId === 'login') {
          document.getElementById('login-form').style.display = 'block';
          document.getElementById('register-form').style.display = 'none';
        } else {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('register-form').style.display = 'block';
        }
        
        currentTab = tabId;
      });
    });
    
    function showError(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
    }
    
    function hideError(elementId) {
      const el = document.getElementById(elementId);
      el.style.display = 'none';
    }
    
    function showSuccess(elementId, message) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.display = 'block';
    }
    
    function hideSuccess(elementId) {
      const el = document.getElementById(elementId);
      el.style.display = 'none';
    }
    
    function setLoading(buttonId, isLoading) {
      const btn = document.getElementById(buttonId);
      if (isLoading) {
        btn.classList.add('loading');
        btn.disabled = true;
      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
    
    function login() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      
      // 简单验证
      if (!username || !password) {
        showError('login-error', '请填写用户名和密码');
        return;
      }
      
      hideError('login-error');
      hideSuccess('login-success');
      setLoading('login-btn', true);
      
      fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username, password })
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.message || '登录失败');
          });
        }
        return response.json();
      })
      .then(data => {
        if (data.success) {
          // 保存 token 和用户信息到 localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);
          
          showSuccess('login-success', '登录成功，正在跳转...');
          
          // 跳转到主页面
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showError('login-error', data.message || '登录失败');
        }
      })
      .catch(error => {
        showError('login-error', error.message);
      })
      .finally(() => {
        setLoading('login-btn', false);
      });
    }
    
    function register() {
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      const confirmPassword = document.getElementById('register-confirm').value;
      
      // 验证
      if (!username || !password || !confirmPassword) {
        showError('register-error', '请填写所有字段');
        return;
      }
      
      if (username.length < 3 || username.length > 20) {
        showError('register-error', '用户名长度需在 3-20 字符之间');
        return;
      }
      
      if (password.length < 6) {
        showError('register-error', '密码长度至少 6 位');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('register-error', '两次输入的密码不一致');
        return;
      }
      
      hideError('register-error');
      hideSuccess('register-success');
      setLoading('register-btn', true);
      
      fetch(`${API_BASE}/auth/register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username, password })
      })
      .then(response => {
        if (!response.ok) {
          return response.json().then(data => {
            throw new Error(data.message || '注册失败');
          });
        }
        return response.json();
      })
      .then(data => {
        if (data.success) {
          // 保存 token 和用户信息
          localStorage.setItem('token', data.token);
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.username);
          
          showSuccess('register-success', '注册成功，正在跳转...');
          
          // 跳转到主页面
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showError('register-error', data.message || '注册失败');
        }
      })
      .catch(error => {
        showError('register-error', error.message);
      })
      .finally(() => {
        setLoading('register-btn', false);
      });
    }
    
    // 检查是否已有登录状态
    function checkAuthStatus() {
      const token = localStorage.getItem('token');
      if (token) {
        // 验证 token 是否有效
        fetch(`${API_BASE}/auth/check`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        })
        .then(response => {
          if (response.ok) {
            // token 有效，跳转到主页面
            window.location.href = '/';
          } else {
            // token 无效，清除本地存储
            localStorage.clear();
          }
        })
        .catch(() => {
          localStorage.clear();
        });
      }
    }
    
    // 页面加载时检查认证状态
    window.addEventListener('DOMContentLoaded', checkAuthStatus);
    
    // Enter键提交
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        if (currentTab === 'login') {
          login();
        } else {
          register();
        }
      }
    });
  </script>
</body>
</html>
