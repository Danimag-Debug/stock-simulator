<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟炒股助手 · 中线策略</title>
<style>
  :root {
    --red: #e63946;
    --green: #2a9d8f;
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f79239;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", sans-serif; font-size: 14px; }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .badge { background: #21262d; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
  .badge.active { border-color: var(--green); color: var(--green); }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .up { color: var(--red); }
  .down { color: var(--green); }
  .neutral { color: var(--text); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 { font-size: 15px; font-weight: 600; }
  .card-body { padding: 16px 20px; }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-buy { background: var(--red); color: #fff; }
  .btn-sell { background: var(--green); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .suggestion-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .suggestion-item:last-child { margin-bottom: 0; }

  .stock-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .stock-name { font-size: 15px; font-weight: 600; }
  .stock-code { font-size: 12px; color: var(--muted); margin-left: 6px; }
  .score-badge { background: rgba(247,146,57,0.15); color: var(--accent); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }

  .price-row { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; }
  .price-item .p-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .price-item .p-value { font-size: 15px; font-weight: 600; }
  .price-item.buy .p-value { color: var(--red); }
  .price-item.stop .p-value { color: #ff6b6b; }
  .price-item.profit .p-value { color: #51cf66; }

  .signals { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .signal-tag { background: #21262d; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted); }

  .action-row { display: flex; align-items: center; justify-content: space-between; }
  .shares-info { font-size: 12px; color: var(--muted); }
  .shares-info span { color: var(--text); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 12px; color: var(--muted); font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px; border-bottom: 1px solid #21262d; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .log-item { display: flex; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #21262d; }
  .log-item:last-child { border-bottom: none; }
  .log-action { padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-right: 12px; white-space: nowrap; }
  .log-action.buy { background: rgba(230,57,70,0.15); color: var(--red); }
  .log-action.sell { background: rgba(42,157,143,0.15); color: var(--green); }
  .log-detail { flex: 1; }
  .log-detail .main-text { font-size: 13px; }
  .log-detail .sub-text { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-profit { font-size: 13px; font-weight: 600; text-align: right; white-space: nowrap; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scan-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .scan-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }

  #toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #323940;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    max-width: 360px;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--green); }
  #toast.error { border-color: var(--red); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
  .update-time { font-size: 11px; color: var(--muted); }

  @media (max-width: 900px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>📈 模拟炒股助手 · <span>中线策略</span></h1>
  <div class="header-right">
    <span class="badge" id="market-status">加载中...</span>
    <span class="update-time" id="last-update">--</span>
  </div>
</header>

<div class="main">

  <!-- 账户概览 -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">账户总资产</div>
      <div class="value" id="total-assets">--</div>
      <div class="sub">初始资金 ¥10,000.00</div>
    </div>
    <div class="summary-card">
      <div class="label">累计盈亏</div>
      <div class="value" id="total-profit">--</div>
      <div class="sub" id="total-profit-pct">--</div>
    </div>
    <div class="summary-card">
      <div class="label">可用现金</div>
      <div class="value" id="cash">--</div>
      <div class="sub" id="cash-pct">--</div>
    </div>
    <div class="summary-card">
      <div class="label">持仓股票</div>
      <div class="value" id="holding-count">--</div>
      <div class="sub" id="holding-value">--</div>
    </div>
  </div>

  <!-- 扫描状态栏 -->
  <div class="scan-bar">
    <div class="scan-info">
      <span id="scan-icon">🔍</span>
      <span id="scan-text">每30分钟自动扫描全市场，寻找中线机会</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span class="update-time" id="last-scan-time">上次扫描: --</span>
      <button class="btn btn-primary" id="scan-btn" onclick="triggerScan()">立即扫描</button>
    </div>
  </div>

  <!-- 两栏 -->
  <div class="two-col">
    <div class="card">
      <div class="card-header">
        <h2>🎯 选股建议</h2>
        <span class="update-time" id="suggestion-time">--</span>
      </div>
      <div class="card-body" id="suggestions-container">
        <div class="loading"><span class="spinner"></span>等待扫描结果...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>💼 当前持仓</h2>
        <button class="btn btn-sm" style="background:#21262d;color:var(--text);border:1px solid var(--border);" onclick="loadPortfolio()">刷新</button>
      </div>
      <div class="card-body" id="holdings-container">
        <div class="loading"><span class="spinner"></span>加载中...</div>
      </div>
    </div>
  </div>

  <!-- 交易记录 -->
  <div class="card">
    <div class="card-header">
      <h2>📋 交易记录</h2>
      <span class="update-time" id="log-count">--</span>
    </div>
    <div class="card-body" id="logs-container" style="max-height:320px;overflow-y:auto;">
      <div class="loading"><span class="spinner"></span>加载中...</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- 自定义确认弹窗 -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;align-items:center;justify-content:center;">
  <div style="background:#1c2128;border:1px solid #444c56;border-radius:16px;padding:28px 32px;min-width:300px;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.5);">
    <div style="font-size:18px;font-weight:600;margin-bottom:12px;" id="modal-title">确认操作</div>
    <div style="color:#8b949e;font-size:14px;line-height:1.7;white-space:pre-line;margin-bottom:24px;" id="modal-body"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;">
      <button id="modal-cancel" style="padding:8px 20px;border-radius:8px;border:1px solid #444c56;background:transparent;color:#e6edf3;font-size:14px;cursor:pointer;">取消</button>
      <button id="modal-confirm" style="padding:8px 20px;border-radius:8px;border:none;background:#e63946;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">确认</button>
    </div>
  </div>
</div>

<script>
var API_BASE = 'http://localhost:5001/api';

// ── 工具 ──
function money(n) {
  return '¥' + Number(n).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function colorClass(n) { return n > 0 ? 'up' : (n < 0 ? 'down' : 'neutral'); }
function sign(n) { return n > 0 ? '+' : ''; }

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || 'success');
  setTimeout(function(){ el.className = ''; }, 4000);
}

function timeAgo(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  var diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return diff + '秒前';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  return d.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
}

// ── 扫描 ──
function triggerScan() {
  var btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.textContent = '扫描中...';
  document.getElementById('scan-icon').textContent = '⏳';
  document.getElementById('scan-text').textContent = '正在扫描全市场，请耐心等待（约1-3分钟）...';

  fetch(API_BASE + '/scan/trigger', {method:'POST'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      toast(d.message, d.success ? 'success' : 'error');
      pollScanStatus();
    })
    .catch(function(e){
      toast('连接服务器失败', 'error');
      btn.disabled = false;
      btn.textContent = '立即扫描';
    });
}

function pollScanStatus() {
  fetch(API_BASE + '/scan/status')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.running) {
        setTimeout(pollScanStatus, 3000);
      } else {
        var btn = document.getElementById('scan-btn');
        btn.disabled = false;
        btn.textContent = '立即扫描';
        document.getElementById('scan-icon').textContent = '✅';
        document.getElementById('scan-text').textContent = '扫描完成！';
        if (d.last_run) {
          document.getElementById('last-scan-time').textContent = '上次扫描: ' + timeAgo(d.last_run);
        }
        loadSuggestions();
      }
    })
    .catch(function(){ setTimeout(pollScanStatus, 5000); });
}

// ── 选股建议 ──
function loadSuggestions() {
  fetch(API_BASE + '/suggestions')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var container = document.getElementById('suggestions-container');

      if (data.updated_at) {
        document.getElementById('suggestion-time').textContent = '更新于 ' + timeAgo(data.updated_at);
      }

      if (!data.items || data.items.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>暂无建议，点击「立即扫描」获取选股结果</p></div>';
        return;
      }

      var html = '';
      for (var i = 0; i < data.items.length; i++) {
        var s = data.items[i];
        var signalHtml = '';
        for (var j = 0; j < (s.signals || []).length; j++) {
          signalHtml += '<span class="signal-tag">' + s.signals[j] + '</span>';
        }
        html += '<div class="suggestion-item">';
        html += '<div class="stock-header">';
        html += '<div><span class="stock-name">' + s.name + '</span><span class="stock-code">' + s.code + '</span></div>';
        html += '<span class="score-badge">评分 ' + s.score + '</span>';
        html += '</div>';
        html += '<div class="price-row">';
        html += '<div class="price-item buy"><div class="p-label">建议买入价</div><div class="p-value">¥' + s.buy_price + '</div></div>';
        html += '<div class="price-item stop"><div class="p-label">止损价</div><div class="p-value">¥' + s.stop_loss + '</div></div>';
        html += '<div class="price-item profit"><div class="p-label">目标价</div><div class="p-value">¥' + s.take_profit + '</div></div>';
        html += '<div class="price-item"><div class="p-label">当前价/涨跌</div><div class="p-value ' + colorClass(s.change_pct) + '">¥' + s.current_price + ' <small>' + sign(s.change_pct) + s.change_pct + '%</small></div></div>';
        html += '</div>';
        html += '<div class="signals">' + signalHtml + '</div>';
        html += '<div class="action-row">';
        html += '<div class="shares-info">建议 <span>' + s.action + '</span> <span>' + s.suggested_shares + '</span> 股 · 预计 <span>' + money(s.estimated_cost) + '</span></div>';
        html += '<button class="btn btn-buy btn-sm" id="buy-btn-' + i + '">'+s.action+'</button>';
        html += '</div></div>';
      }
      container.innerHTML = html;

      // 绑定买入按钮事件（用 idx 避免闭包捕获错误）
      for (var k = 0; k < data.items.length; k++) {
        (function(stock, idx) {
          var btn = document.getElementById('buy-btn-' + idx);
          if (btn) {
            btn.addEventListener('click', function() {
              doBuy(stock.code, stock.name, stock.suggested_shares, stock.buy_price);
            });
          }
        })(data.items[k], k);
      }
    })
    .catch(function(e){
      console.error(e);
      document.getElementById('suggestions-container').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请确认后端服务已启动</p></div>';
    });
}

// ── 自定义确认弹窗（替代confirm，兼容内嵌浏览器）──
function showModal(title, body, confirmText, confirmColor, onConfirm) {
  var overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  var confirmBtn = document.getElementById('modal-confirm');
  confirmBtn.textContent = confirmText || '确认';
  confirmBtn.style.background = confirmColor || '#e63946';
  overlay.style.display = 'flex';

  function close() { overlay.style.display = 'none'; }
  document.getElementById('modal-cancel').onclick = close;
  overlay.onclick = function(e) { if (e.target === overlay) close(); };
  confirmBtn.onclick = function() { close(); onConfirm(); };
}

// ── 买入 ──
function doBuy(code, name, shares, price) {
  showModal(
    '确认模拟买入',
    name + '(' + code + ')\n数量：' + shares + ' 股\n价格：¥' + price + '\n预计花费：¥' + (shares * price).toFixed(2),
    '确认买入',
    '#e63946',
    function() {
      fetch(API_BASE + '/trade/buy', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code: code, name: name, shares: shares, price: price})
      })
      .then(function(r){ return r.json(); })
      .then(function(d){
        toast(d.message, d.success ? 'success' : 'error');
        if (d.success) { loadPortfolio(); loadLogs(); }
      })
      .catch(function(e){
        toast('买入请求失败', 'error');
        console.error(e);
      });
    }
  );
}

// ── 卖出 ──
function doSell(code, name, shares, price) {
  showModal(
    '确认模拟卖出',
    name + '(' + code + ')\n全部 ' + shares + ' 股\n当前价：¥' + price,
    '确认卖出',
    '#2a9d8f',
    function() {
      fetch(API_BASE + '/trade/sell', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code: code, shares: shares, price: price})
      })
      .then(function(r){ return r.json(); })
      .then(function(d){
        toast(d.message, d.success ? 'success' : 'error');
        if (d.success) { loadPortfolio(); loadLogs(); }
      })
      .catch(function(e){
        toast('卖出请求失败', 'error');
        console.error(e);
      });
    }
  );
}

// ── 持仓 ──
function loadPortfolio() {
  fetch(API_BASE + '/portfolio')
    .then(function(r){ return r.json(); })
    .then(function(resp){
      var data = resp.data;

      document.getElementById('total-assets').textContent = money(data.total_market_value);
      document.getElementById('total-assets').className = 'value ' + colorClass(data.total_profit);
      document.getElementById('total-profit').textContent = sign(data.total_profit) + money(data.total_profit).replace('¥','');
      document.getElementById('total-profit').className = 'value ' + colorClass(data.total_profit);
      document.getElementById('total-profit-pct').textContent = sign(data.total_profit_pct) + data.total_profit_pct.toFixed(2) + '%';
      document.getElementById('cash').textContent = money(data.cash);
      document.getElementById('cash-pct').textContent = '占总资产 ' + (data.cash / data.initial_cash * 100).toFixed(1) + '%';
      document.getElementById('holding-count').textContent = data.holdings.length + ' 只';
      document.getElementById('holding-value').textContent = '持仓市值 ' + money(data.total_market_value - data.cash);
      document.getElementById('last-update').textContent = '刷新于 ' + timeAgo(data.snapshot_time || new Date().toISOString());

      var container = document.getElementById('holdings-container');
      if (data.holdings.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">💼</div><p>暂无持仓，等待买入建议</p></div>';
        return;
      }

      var html = '<table><thead><tr><th>股票</th><th>持仓</th><th>均价</th><th>现价</th><th>盈亏</th><th>操作</th></tr></thead><tbody>';
      for (var i = 0; i < data.holdings.length; i++) {
        var h = data.holdings[i];
        html += '<tr>';
        html += '<td><strong>' + h.name + '</strong><br><small style="color:var(--muted)">' + h.code + '</small></td>';
        html += '<td>' + h.shares + ' 股</td>';
        html += '<td>¥' + h.avg_price + '</td>';
        html += '<td class="' + colorClass(h.change_pct) + '">¥' + h.current_price + '<br><small>' + sign(h.change_pct) + h.change_pct + '%</small></td>';
        html += '<td class="' + colorClass(h.profit) + '">' + sign(h.profit) + '¥' + Math.abs(h.profit).toFixed(2) + '<br><small>' + sign(h.profit_pct) + h.profit_pct.toFixed(2) + '%</small></td>';
        html += '<td><button class="btn btn-sell btn-sm" id="sell-btn-' + i + '">卖出</button></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      container.innerHTML = html;

      // 绑定卖出按钮事件（用 idx 避免闭包捕获错误）
      for (var k = 0; k < data.holdings.length; k++) {
        (function(holding, idx) {
          var btn = document.getElementById('sell-btn-' + idx);
          if (btn) {
            btn.addEventListener('click', function() {
              doSell(holding.code, holding.name, holding.shares, holding.current_price);
            });
          }
        })(data.holdings[k], k);
      }
    })
    .catch(function(e){ console.error(e); });
}

// ── 交易记录 ──
function loadLogs() {
  fetch(API_BASE + '/logs')
    .then(function(r){ return r.json(); })
    .then(function(logs){
      document.getElementById('log-count').textContent = '共 ' + logs.length + ' 条';
      var container = document.getElementById('logs-container');
      if (logs.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无交易记录</p></div>';
        return;
      }
      var html = '';
      for (var i = 0; i < logs.length; i++) {
        var l = logs[i];
        var profitHtml = '';
        if (l.profit !== undefined) {
          profitHtml = '<div class="log-profit ' + colorClass(l.profit) + '">' + sign(l.profit) + '¥' + Math.abs(l.profit).toFixed(2) + '<br><small>' + sign(l.profit_pct) + (l.profit_pct ? l.profit_pct.toFixed(2) : '0.00') + '%</small></div>';
        }
        html += '<div class="log-item">';
        html += '<div class="log-action ' + (l.action === '买入' ? 'buy' : 'sell') + '">' + l.action + '</div>';
        html += '<div class="log-detail"><div class="main-text"><strong>' + l.name + '</strong>(' + l.code + ') ' + l.shares + '股 @ ¥' + l.price + '</div>';
        html += '<div class="sub-text">' + new Date(l.time).toLocaleString('zh-CN') + ' · 手续费 ¥' + l.commission + '</div></div>';
        html += profitHtml + '</div>';
      }
      container.innerHTML = html;
    })
    .catch(function(e){ console.error(e); });
}

// ── 市场状态 ──
function updateMarketStatus() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes(), day = now.getDay();
  var el = document.getElementById('market-status');
  var isWeekday = day >= 1 && day <= 5;
  var isMorning = (h === 9 && m >= 30) || h === 10 || (h === 11 && m < 30);
  var isAfternoon = h === 13 || h === 14 || (h === 15 && m === 0);
  var isOpen = isWeekday && (isMorning || isAfternoon);
  el.textContent = isOpen ? '🟢 市场交易中' : '⚪ 市场休市';
  el.className = 'badge ' + (isOpen ? 'active' : '');
}

// ── 启动 ──
updateMarketStatus();
loadSuggestions();
loadPortfolio();
loadLogs();
setInterval(loadPortfolio, 60000);
setInterval(loadSuggestions, 30000);
setInterval(loadLogs, 30000);
setInterval(updateMarketStatus, 30000);
</script>
