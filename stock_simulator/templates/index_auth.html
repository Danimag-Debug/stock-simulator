<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模拟炒股助手 · 中线策略</title>
<style>
  :root {
    --red: #e63946;
    --green: #2a9d8f;
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f79239;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", sans-serif; font-size: 14px; }

  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .badge { background: #21262d; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
  .badge.active { border-color: var(--green); color: var(--green); }
  
  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .user-avatar {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), #e63946);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
  }
  
  .user-name {
    font-size: 14px;
    font-weight: 500;
  }
  
  .logout-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .logout-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .summary-card .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .summary-card .value { font-size: 28px; font-weight: 700; }
  .summary-card .value.positive { color: var(--red); }
  .summary-card .value.negative { color: var(--green); }

  .section { margin-bottom: 32px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .section-header h2 { font-size: 18px; font-weight: 600; }
  .section-header .actions { display: flex; gap: 8px; }
  .btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #e68535; }
  .btn-secondary { background: var(--border); }
  .btn-secondary:hover { background: #444950; }
  .btn-small { padding: 4px 12px; font-size: 12px; }

  .stocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stock-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .stock-card:hover { border-color: var(--accent); }
  .stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .stock-name { font-size: 16px; font-weight: 600; }
  .stock-code { color: var(--muted); font-size: 12px; }
  .stock-price { font-size: 22px; font-weight: 700; }
  .stock-change { font-size: 14px; font-weight: 500; }
  .stock-change.positive { color: var(--red); }
  .stock-change.negative { color: var(--green); }
  .stock-meta { display: flex; gap: 16px; margin: 8px 0; font-size: 12px; color: var(--muted); }
  .stock-meta span { display: flex; align-items: center; gap: 4px; }
  .stock-tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px; }
  .tag { background: rgba(247, 146, 57, 0.1); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .stock-actions { display: flex; gap: 8px; }
  .stock-actions button { flex: 1; }

  /* 多维度评分展示 */
  .stock-score-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 12px 0;
    padding: 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .score-circle {
    flex-shrink: 0;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2.5px solid #8b949e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  .score-num { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .score-lbl { font-size: 9px; color: var(--muted); line-height: 1; }
  .score-detail-wrap { flex: 1; min-width: 0; }
  .score-breakdown { display: flex; flex-direction: column; gap: 4px; }
  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-label { font-size: 10px; color: var(--muted); width: 52px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .score-val { font-size: 11px; font-weight: 600; color: var(--text); width: 20px; text-align: right; flex-shrink: 0; }

  .holdings-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .holdings-table th, .holdings-table td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .holdings-table th {
    background: rgba(48, 54, 61, 0.3);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .holdings-table tr:last-child td { border-bottom: none; }
  .holdings-table tr:hover { background: rgba(48, 54, 61, 0.1); }

  .logs-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .logs-table th, .logs-table td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .logs-table th {
    background: rgba(48, 54, 61, 0.3);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .logs-table tr:last-child td { border-bottom: none; }

  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 280px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    z-index: 10000;
    transform: translateY(-20px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
  .toast.success { border-left: 4px solid var(--green); }
  .toast.error { border-left: 4px solid var(--red); }
  .toast-content { display: flex; justify-content: space-between; align-items: center; }
  .toast-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }

  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    min-width: 300px;
    max-width: 420px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .modal-body {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-line;
    margin-bottom: 24px;
  }
  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  #modal-cancel {
    background: var(--border);
    color: var(--text);
  }
  #modal-confirm {
    background: var(--red);
    color: white;
  }

  .no-auth-message {
    display: none;
    text-align: center;
    padding: 60px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 40px;
  }
  
  .no-auth-message h3 {
    font-size: 20px;
    margin-bottom: 12px;
  }
  
  .no-auth-message p {
    color: var(--muted);
    margin-bottom: 24px;
  }
  
  .auth-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .no-data-message {
    text-align: center;
    padding: 60px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 40px auto;
    max-width: 500px;
    width: 100%;
  }

  /* 详情弹窗样式 */
  .detail-modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .detail-modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 660px;
    max-height: 88vh;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  .detail-modal::-webkit-scrollbar { width: 6px; }
  .detail-modal::-webkit-scrollbar-track { background: transparent; }
  .detail-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 1;
  }
  .detail-grade-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 4px;
  }
  .detail-body { padding: 20px 24px; }
  
  /* 评分概览行 */
  .detail-score-overview {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .detail-score-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .detail-score-item .dsi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .detail-score-item .dsi-value { font-size: 18px; font-weight: 700; }
  .detail-score-item .dsi-max { font-size: 10px; color: var(--muted); }
  
  /* 维度分析 */
  .dimension-section {
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .dimension-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    user-select: none;
  }
  .dimension-header:hover { background: rgba(255,255,255,0.04); }
  .dimension-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .dim-score-chip {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .dimension-progress {
    height: 4px;
    background: rgba(255,255,255,0.08);
    margin: 0 16px 0;
    border-radius: 2px;
    overflow: hidden;
  }
  .dimension-progress-bar { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .dimension-content {
    padding: 14px 16px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .signal-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .signal-tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    border: 1px solid;
  }
  .signal-tag.bullish { background: rgba(230,57,70,0.1); border-color: rgba(230,57,70,0.3); color: #e63946; }
  .signal-tag.bearish { background: rgba(42,157,143,0.1); border-color: rgba(42,157,143,0.3); color: #2a9d8f; }
  .signal-tag.neutral { background: rgba(139,148,158,0.1); border-color: rgba(139,148,158,0.3); color: var(--muted); }
  .dim-summary-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    padding: 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  
  /* 交易计划 */
  .trade-plan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .trade-plan-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 12px;
  }
  .tpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .tpi-value { font-size: 16px; font-weight: 700; }
  .tpi-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
  
  /* 行业前景 */
  .industry-outlook {
    background: rgba(247,146,57,0.06);
    border: 1px solid rgba(247,146,57,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .industry-outlook .outlook-title { font-weight: 600; color: var(--accent); margin-bottom: 6px; font-size: 13px; }
  
  /* 风险提示 */
  .risk-section {
    background: rgba(230,57,70,0.05);
    border: 1px solid rgba(230,57,70,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .risk-title { font-size: 13px; font-weight: 600; color: var(--red); margin-bottom: 8px; }
  .risk-item {
    font-size: 12px;
    color: var(--muted);
    padding: 3px 0;
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .risk-item::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--red);
    font-size: 10px;
  }
  
  /* 免责声明 */
  .detail-disclaimer {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    padding: 12px;
    opacity: 0.7;
  }
  
  /* 专业技术指标小卡片 */
  .indicator-mini-card {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 6px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .indicator-mini-card:hover {
    border-color: var(--accent);
  }
  .imc-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .imc-value {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
  }
  .imc-hint {
    font-size: 10px;
    margin-top: 2px;
    opacity: 0.85;
  }
  
  /* 响应式 */
  @media (max-width: 1200px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .stocks-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .detail-score-overview { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 768px) {
    .trade-plan-grid { grid-template-columns: 1fr; }
    .detail-score-overview { grid-template-columns: 1fr 1fr; }
    .summary-grid { grid-template-columns: 1fr; }
    .stocks-grid { grid-template-columns: 1fr; }
    .section-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .section-header .actions { width: 100%; }
    .holdings-table, .logs-table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>
  <header>
    <h1>模拟炒股<span>助手</span></h1>
    <div class="header-right">
      <div class="badge" id="scan-status">未连接</div>
      <div class="user-info" id="user-info" style="display: none;">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-name" id="user-name">用户名</div>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- 未登录时的提示 -->
    <div class="no-auth-message" id="no-auth-message">
      <h3>请先登录</h3>
      <p>登录后即可查看股票推荐、管理持仓和进行模拟交易</p>
      <div class="auth-buttons">
        <button class="btn" onclick="window.location.href='/login.html'">立即登录</button>
        <button class="btn btn-secondary" onclick="window.location.href='/login.html'">注册账号</button>
      </div>
    </div>

    <!-- 已登录后的内容 -->
    <div id="app-content" style="display: none;">
      <!-- 账户概览 -->
      <div class="summary-grid">
        <div class="summary-card">
          <div class="label">账户总资产</div>
          <div class="value" id="total-assets">¥ 0.00</div>
        </div>
        <div class="summary-card">
          <div class="label">可用现金</div>
          <div class="value" id="cash">¥ 0.00</div>
        </div>
        <div class="summary-card">
          <div class="label">总盈亏</div>
          <div class="value" id="total-profit">¥ 0.00</div>
        </div>
        <div class="summary-card">
          <div class="label">收益率</div>
          <div class="value" id="profit-pct">0.00%</div>
        </div>
      </div>

      <!-- 推荐股票 -->
      <div class="section">
        <div class="section-header">
          <h2>📈 今日推荐</h2>
          <div class="actions">
            <button class="btn btn-small" id="btn-scan" onclick="triggerScan()">手动扫描</button>
            <button class="btn btn-small btn-secondary" id="btn-refresh" onclick="refreshSuggestions()">刷新推荐</button>
          </div>
        </div>
        <div class="stocks-grid" id="stocks-grid">
          <!-- 推荐股票卡片会动态插入到这里 -->
        </div>
      </div>

      <!-- 持仓 -->
      <div class="section">
        <div class="section-header">
          <h2>📊 我的持仓</h2>
          <div class="actions">
            <button class="btn btn-small" onclick="loadPortfolio()">刷新持仓</button>
          </div>
        </div>
        <div class="holdings-table-container">
          <table class="holdings-table">
            <thead>
              <tr>
                <th>股票</th>
                <th>持仓数量</th>
                <th>成本价</th>
                <th>现价</th>
                <th>市值</th>
                <th>盈亏</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="holdings-body">
              <!-- 持仓数据会动态插入到这里 -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- 交易记录 -->
      <div class="section">
        <div class="section-header">
          <h2>📝 交易记录</h2>
          <div class="actions">
            <button class="btn btn-small" onclick="loadLogs()">刷新记录</button>
          </div>
        </div>
        <div class="logs-table-container">
          <table class="logs-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>操作</th>
                <th>股票</th>
                <th>数量</th>
                <th>价格</th>
                <th>金额</th>
                <th>盈亏</th>
              </tr>
            </thead>
            <tbody id="logs-body">
              <!-- 交易记录会动态插入到这里 -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast">
    <div class="toast-content">
      <span id="toast-message"></span>
      <button class="toast-close" onclick="hideToast()">×</button>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">确认操作</div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel">取消</button>
        <button id="modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let authToken = null;
    let currentUser = null;

    // 认证相关函数
    function checkAuth() {
      authToken = localStorage.getItem('token');
      currentUser = {
        id: localStorage.getItem('user_id'),
        username: localStorage.getItem('username')
      };
      
      if (authToken && currentUser.id) {
        // 验证 token 是否有效
        fetch(`${API_BASE}/auth/check`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          }
        })
        .then(response => {
          if (response.ok) {
            return response.json();
          }
          throw new Error('Token 无效');
        })
        .then(data => {
          if (data.success) {
            // 显示用户信息
            document.getElementById('user-info').style.display = 'flex';
            document.getElementById('user-name').textContent = currentUser.username;
            document.getElementById('user-avatar').textContent = currentUser.username.charAt(0).toUpperCase();
            
            // 显示应用内容
            document.getElementById('no-auth-message').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // 加载数据
            loadPortfolio();
            loadSuggestions();
            loadLogs();
            updateScanStatus();
            setInterval(updateScanStatus, 10000);
          } else {
            logout();
          }
        })
        .catch(() => {
          logout();
        });
      } else {
        // 未登录，直接跳转到登录页
        window.location.href = '/login';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/login';
    }

    // API 请求辅助函数（带认证）
    function authFetch(url, options = {}) {
      if (!authToken) {
        toast('请先登录', 'error');
        setTimeout(() => window.location.href = '/login.html', 1000);
        return Promise.reject('未登录');
      }
      
      const headers = {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json',
        ...options.headers
      };
      
      return fetch(url, { ...options, headers });
    }

    // Toast 提示
    function toast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    // 模态框
    function showModal(title, body, confirmText, confirmColor, onConfirm) {
      const overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-body').textContent = body;
      const confirmBtn = document.getElementById('modal-confirm');
      confirmBtn.textContent = confirmText || '确认';
      confirmBtn.style.background = confirmColor || '#e63946';
      overlay.style.display = 'flex';
      
      function close() { overlay.style.display = 'none'; }
      
      document.getElementById('modal-cancel').onclick = close;
      overlay.onclick = function(e) { if (e.target === overlay) close(); };
      confirmBtn.onclick = function() { close(); onConfirm(); };
    }

    // 扫描状态
    function updateScanStatus() {
      fetch(`${API_BASE}/scan/status`)
        .then(r => r.json())
        .then(data => {
          const statusEl = document.getElementById('scan-status');
          if (data.running) {
            statusEl.textContent = '扫描中...';
            statusEl.classList.add('active');
          } else if (data.last_run) {
            const lastRun = new Date(data.last_run);
            const now = new Date();
            const diffMin = Math.floor((now - lastRun) / 60000);
            statusEl.textContent = `最近更新：${diffMin}分钟前`;
            statusEl.classList.remove('active');
          } else {
            statusEl.textContent = '待扫描';
            statusEl.classList.remove('active');
          }
        });
    }

    // 手动触发扫描（兼容旧调用）
    function manualScan() {
      triggerScan();
    }

    // 刷新推荐（带明显 loading 反馈）
    function refreshSuggestions() {
      const btn = document.getElementById('btn-refresh');
      if (btn) { btn.disabled = true; btn.textContent = '刷新中...'; }
      const grid = document.getElementById('stocks-grid');
      grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">⏳ 正在获取实时价格...</div>';
      fetch(`${API_BASE}/suggestions`)
        .then(r => r.json())
        .then(data => {
          renderSuggestions(data);
          toast('推荐价格已刷新', 'success');
        })
        .catch(() => toast('刷新失败，请重试', 'error'))
        .finally(() => {
          if (btn) { btn.disabled = false; btn.textContent = '刷新推荐'; }
        });
    }

    // 加载推荐股票
    function loadSuggestions() {
      fetch(`${API_BASE}/suggestions`)
        .then(r => {
          if (!r.ok) {
            throw new Error(`API请求失败: ${r.status}`);
          }
          return r.json();
        })
        .then(data => renderSuggestions(data))
        .catch(err => {
          console.error('加载推荐失败:', err);
        });
    }

    // 渲染推荐列表（抽成独立函数）
    function renderSuggestions(data) {
      const grid = document.getElementById('stocks-grid');
          grid.innerHTML = '';
          
          if (!data.items || data.items.length === 0) {
            // 没有推荐数据时显示提示
            grid.innerHTML = `
              <div class="no-data-message">
                <div style="font-size:24px; margin-bottom:12px;">📈</div>
                <div style="font-size:16px; font-weight:600; margin-bottom:8px;">暂无股票推荐</div>
                <div style="color:var(--muted); font-size:14px; margin-bottom:16px;">
                  点击"手动扫描"按钮获取最新推荐
                </div>
                <button class="btn" onclick="triggerScan()" style="margin-top:8px;">
                  <span class="icon">🔍</span> 手动扫描
                </button>
                <div style="margin-top:16px; font-size:12px; color:var(--muted);">
                  提示：首次扫描可能需要1-3分钟，请耐心等待
                </div>
              </div>
            `;
            return;
          }
          
          data.items.forEach((item, idx) => {
            const alreadyHolding = item.already_holding || false;
            const card = document.createElement('div');
            card.className = 'stock-card';
            const code = item.code || item.stock_code || '';
            const name = item.name || item.stock_name || '未知';
            const curPrice = (item.current_price || 0).toFixed(2);
            const changePct = item.change_pct || 0;
            const buyPrice = item.buy_price || item.current_price || 0;
            const stopLoss = item.stop_loss || 0;
            const takeProfit = item.take_profit || 0;
            const signals = Array.isArray(item.signals) ? item.signals : [];
            const breakdown = item.score_breakdown || {};
            const score = item.score || 0;
            
            // 评分颜色：75+红色(强烈推荐), 60+橙色(推荐), 45+黄色(观察)
            const scoreColor = score >= 75 ? '#e63946' : score >= 60 ? '#f79239' : '#8b949e';
            const scoreLabel = score >= 75 ? '强烈推荐' : score >= 60 ? '推荐' : '关注';
            
            // 构建评分拆分HTML
            const breakdownHtml = Object.keys(breakdown).length > 0
              ? `<div class="score-breakdown">
                  ${Object.entries(breakdown).map(([k, v]) => `
                    <div class="score-item">
                      <span class="score-label">${k}</span>
                      <div class="score-bar-wrap">
                        <div class="score-bar" style="width:${Math.min(v/40*100, 100)}%; background:${v >= 28 ? '#e63946' : v >= 18 ? '#f79239' : '#8b949e'};"></div>
                      </div>
                      <span class="score-val">${v}</span>
                    </div>`).join('')}
                </div>`
              : '';

            card.innerHTML = `
              <div class="stock-header">
                <div>
                  <div class="stock-name">${name}</div>
                  <div class="stock-code">${code}</div>
                </div>
                <div style="text-align:right;">
                  <div class="stock-price">¥${curPrice}</div>
                  <div class="stock-change ${changePct >= 0 ? 'positive' : 'negative'}">
                    ${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%
                  </div>
                </div>
              </div>
              <div class="stock-score-row">
                <div class="score-circle" style="border-color:${scoreColor};color:${scoreColor};">
                  <span class="score-num">${score}</span>
                  <span class="score-lbl">${scoreLabel}</span>
                </div>
                <div class="score-detail-wrap">
                  ${breakdownHtml}
                </div>
              </div>
              <div class="stock-meta" style="margin-top:4px;">
                <span>RSI: ${item.rsi ? item.rsi.toFixed(1) : '--'}</span>
                <span>量比: ${item.vol_ratio ? item.vol_ratio.toFixed(1) + 'x' : '--'}</span>
                <span>仓位: ${Math.round((item.position_pct || 0.08) * 100)}%</span>
              </div>
              <div class="stock-meta" style="margin-top:4px;">
                <span>买入: ¥${buyPrice.toFixed(2)}</span>
                <span>止损: ¥${stopLoss.toFixed(2)}</span>
                <span>目标: ¥${takeProfit.toFixed(2)}</span>
              </div>
              <div class="stock-tags">
                ${signals.map(signal => `<span class="tag">${signal}</span>`).join('')}
              </div>
              <div class="stock-actions">
                <button class="btn btn-buy" data-code="${code}" data-name="${name}" data-shares="${item.suggested_shares || 100}" data-price="${buyPrice}">
                  ${alreadyHolding ? '加仓' : '买入'}
                </button>
                <button class="btn btn-secondary btn-detail" style="background:rgba(247,146,57,0.12);border:1px solid rgba(247,146,57,0.3);color:var(--accent);">
                  📋 推荐理由
                </button>
              </div>
            `;
            
            // 使用事件监听，避免内联 onclick 的 JSON 转义问题
            card.querySelector('.btn-buy').addEventListener('click', function() {
              doBuy(code, name, item.suggested_shares || 100, buyPrice);
            });
            
            card.querySelector('.btn-detail').addEventListener('click', function() {
              showStockDetail(code, item);
            });
            
            grid.appendChild(card);
          });
          
          if (data.updated_at) {
            const time = new Date(data.updated_at).toLocaleString('zh-CN');
            const scanTime = document.getElementById('scan-time');
            if (scanTime) scanTime.textContent = time;
          }
    }

                    <div class="${log.profit_pct >= 0 ? 'positive' : 'negative'}" style="font-size: 11px;">

    // 买入操作
    function doBuy(code, name, shares, price) {
      showModal('确认模拟买入',
        `${name}(${code})\n数量：${shares} 股\n价格：¥${price}\n预计花费：¥${(shares * price).toFixed(2)}`,
        '确认买入', '#e63946',
        function() {
          authFetch(`${API_BASE}/trade/buy`, {
            method: 'POST',
            body: JSON.stringify({ code, name, shares, price })
          })
          .then(r => r.json())
          .then(data => {
            toast(data.message, data.success ? 'success' : 'error');
            if (data.success) {
              loadPortfolio();
              loadLogs();
              loadSuggestions(); // 刷新推荐（因为持仓状态可能变了）
            }
          })
          .catch(() => toast('买入失败', 'error'));
        });
    }

    // 卖出提示
    function sellPrompt(code, name, price, maxShares) {
      const inputId = `sell-shares-${code}`;
      const modalBody = `
        ${name}(${code})\n当前价格：¥${price}\n最大可卖：${maxShares} 股\n\n卖出数量：
        <input type="number" id="${inputId}" value="${maxShares}" min="100" max="${maxShares}" step="100" style="width: 100px; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); margin-top: 8px;">
      `;
      
      showModal('确认模拟卖出', modalBody, '确认卖出', '#2a9d8f',
        function() {
          const shares = parseInt(document.getElementById(inputId).value);
          if (shares < 100 || shares > maxShares || isNaN(shares)) {
            toast('请输入有效的卖出数量（100的整数倍）', 'error');
            return;
          }
          
          authFetch(`${API_BASE}/trade/sell`, {
            method: 'POST',
            body: JSON.stringify({ code, shares, price })
          })
          .then(r => r.json())
          .then(data => {
            toast(data.message, data.success ? 'success' : 'error');
            if (data.success) {
              loadPortfolio();
              loadLogs();
            }
          })
          .catch(() => toast('卖出失败', 'error'));
        });
    }

    // 股票详情 - 显示完整推荐分析报告
    function showStockDetail(code, item) {
      const existing = document.getElementById('stock-detail-modal');
      if (existing) existing.remove();

      const name = item.name || item.stock_name || '未知';
      const curPrice = parseFloat(item.current_price || 0);
      const changePct = parseFloat(item.change_pct || 0);
      const score = parseInt(item.score || 0);
      const detail = item.recommendation_detail || {};
      const breakdown = item.score_breakdown || {};
      const signals = item.signals || [];
      const buyPrice = parseFloat(item.buy_price || curPrice);
      const stopLoss = parseFloat(item.stop_loss || 0);
      const takeProfit = parseFloat(item.take_profit || 0);
      
      // 评分等级颜色
      const gradeColor = detail.grade_color || (score >= 78 ? '#e63946' : score >= 65 ? '#f79239' : score >= 55 ? '#f0a500' : '#8b949e');
      const gradeDesc = detail.grade_desc || (score >= 78 ? '强烈推荐' : score >= 65 ? '推荐' : score >= 55 ? '关注' : '观察');
      const trendDir = detail.trend_direction || '';
      
      // 技术面数据（专业版）
      const tech = detail.technical || {};
      const techScore = breakdown['技术面'] || tech.score || 0;
      const techSignals = tech.signals || [];
      const techSummary = tech.summary || '';
      
      // 专业技术指标
      const rsi = tech.rsi || item.rsi || 50;
      const kdj_k = tech.kdj_k || 50;
      const kdj_d = tech.kdj_d || 50;
      const kdj_j = tech.kdj_j || 50;
      const wr = tech.wr || -50;
      const volRatio = tech.vol_ratio || item.vol_ratio || 1;
      const momentum10d = tech.momentum_10d || 0;
      const atr_pct = tech.atr_pct || 0;
      const bollPos = tech.boll_position || 50;
      const bollWidth = tech.boll_width || 0;
      const obvTrend = tech.obv_trend || '--';
      const ma20 = tech.ma20 || '--';
      const ma60 = tech.ma60 || '--';
      const macd = tech.macd || 0;
      const amountYi = tech.amount_yi || 0;
      
      // 基本面数据
      const fund = detail.fundamental || {};
      const fundScore = breakdown['基本面'] || fund.score || 0;
      const fundSignals = fund.signals || [];
      const fundSummary = fund.summary || '';
      
      // 新闻行业数据
      const news = detail.news_sector || {};
      const newsScore = breakdown['新闻行业'] || news.score || 0;
      const newsSignals = news.signals || [];
      const newsSummary = news.summary || '';
      const industryOutlook = news.industry_outlook || '';
      const industry = news.industry || '';
      
      // 交易计划
      const tradePlan = detail.trade_plan || {};
      const profitPct = tradePlan.profit_target_pct || (((takeProfit - buyPrice) / buyPrice) * 100).toFixed(1);
      const lossPct = tradePlan.stop_loss_pct || (((buyPrice - stopLoss) / buyPrice) * 100).toFixed(1);
      const rrRatio = tradePlan.risk_reward_ratio || (lossPct > 0 ? (profitPct / lossPct).toFixed(2) : '--');
      const strategyNote = tradePlan.strategy_note || item.strategy_note || '';
      
      // 风险提示
      const riskNotes = detail.risk_notes || ['当前无明显风险信号'];
      
      // 构建维度信号标签HTML
      function buildSignalTags(sigs) {
        if (!sigs || sigs.length === 0) return '<span style="color:var(--muted);font-size:12px;">暂无具体信号</span>';
        return sigs.map(s => {
          let cls = 'neutral';
          if (s.includes('⚠️') || s.includes('利空') || s.includes('下滑') || s.includes('高估') || s.includes('亏损') || s.includes('高负债') || s.includes('死叉') || s.includes('超买') || s.includes('风险') || s.includes('警示')) cls = 'bearish';
          else if (s.includes('利好') || s.includes('优') || s.includes('增长') || s.includes('龙头') || s.includes('突破') || s.includes('🔥') || s.includes('🔆') || s.includes('净流入') || s.includes('低估') || s.includes('合理') || s.includes('金叉') || s.includes('多头') || s.includes('超卖') || s.includes('反弹')) cls = 'bullish';
          return `<span class="signal-tag ${cls}">${s}</span>`;
        }).join('');
      }
      
      // 维度分数颜色
      function dimColor(score, maxScore) {
        const pct = score / maxScore;
        if (pct >= 0.75) return '#e63946';
        if (pct >= 0.5) return '#f79239';
        if (pct >= 0.3) return '#f0a500';
        return '#8b949e';
      }
      
      // 指标状态颜色
      function rsiColor(v) { return v > 70 ? '#e63946' : v < 35 ? '#2a9d8f' : '#f0a500'; }
      function kdjColor(j) { return j > 90 ? '#e63946' : j < 10 ? '#2a9d8f' : '#e6edf3'; }
      function wrColor(v) { return v > -20 ? '#e63946' : v < -80 ? '#2a9d8f' : '#e6edf3'; }
      function momColor(v) { return v > 5 ? '#e63946' : v < -5 ? '#2a9d8f' : '#e6edf3'; }
      function bollColor(p) { return p > 85 ? '#e63946' : p < 15 ? '#2a9d8f' : '#f0a500'; }
      
      // 趋势方向图标
      function trendIcon(dir) {
        if (!dir) return '';
        if (dir.includes('上涨')) return '🚀';
        if (dir.includes('偏多')) return '📈';
        if (dir.includes('下降')) return '📉';
        if (dir.includes('偏空')) return '⬇️';
        return '↔️';
      }
      
      const modal = document.createElement('div');
      modal.id = 'stock-detail-modal';
      modal.className = 'detail-modal-overlay';
      modal.innerHTML = `
        <div class="detail-modal">
          <!-- 头部 -->
          <div class="detail-header">
            <div>
              <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span style="font-size:20px;font-weight:700;">${name}</span>
                <span style="color:var(--muted);font-size:13px;">${code}</span>
                <span style="font-size:18px;font-weight:700;color:${changePct>=0?'var(--red)':'var(--green)'}">¥${curPrice.toFixed(2)} ${changePct>=0?'+':''}${changePct.toFixed(2)}%</span>
                ${trendDir ? `<span style="font-size:12px;color:var(--muted);background:#21262d;padding:3px 8px;border-radius:10px;">${trendIcon(trendDir)} ${trendDir}</span>` : ''}
              </div>
              <div style="margin-top:6px;">
                <span class="detail-grade-badge" style="background:${gradeColor}22;border:1px solid ${gradeColor}44;color:${gradeColor};">
                  ⭐ ${gradeDesc} · 综合评分 ${score}分
                </span>
                ${strategyNote ? `<span style="font-size:12px;color:var(--muted);margin-left:8px;">${strategyNote}</span>` : ''}
              </div>
            </div>
            <button onclick="document.getElementById('stock-detail-modal').remove()"
              style="background:var(--border);border:none;color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;flex-shrink:0;">
              关闭
            </button>
          </div>
          
          <div class="detail-body">
          
            <!-- 评分概览 -->
            <div class="detail-score-overview" style="margin-bottom:20px;">
              <div class="detail-score-item" style="border:2px solid ${dimColor(techScore,40)}22;">
                <div class="dsi-label">📊 技术面</div>
                <div class="dsi-value" style="color:${dimColor(techScore,40)};">${techScore}</div>
                <div class="dsi-max">/ 40分</div>
              </div>
              <div class="detail-score-item" style="border:2px solid ${dimColor(fundScore,25)}22;">
                <div class="dsi-label">🏢 基本面</div>
                <div class="dsi-value" style="color:${dimColor(fundScore,25)};">${fundScore}</div>
                <div class="dsi-max">/ 25分</div>
              </div>
              <div class="detail-score-item" style="border:2px solid ${dimColor(newsScore,35)}22;">
                <div class="dsi-label">📰 行业情报</div>
                <div class="dsi-value" style="color:${dimColor(newsScore,35)};">${newsScore}</div>
                <div class="dsi-max">/ 35分</div>
              </div>
              <div class="detail-score-item" style="border:2px solid ${gradeColor}33;background:${gradeColor}0a;">
                <div class="dsi-label">🎯 综合评分</div>
                <div class="dsi-value" style="color:${gradeColor};">${score}</div>
                <div class="dsi-max">/ 100分</div>
              </div>
            </div>
            
            <!-- 技术面分析（专业版） -->
            <div class="dimension-section">
              <div class="dimension-header">
                <div class="dimension-title">
                  📊 技术面分析
                  <span class="dim-score-chip" style="background:${dimColor(techScore,40)}22;color:${dimColor(techScore,40)};">${techScore}/40</span>
                </div>
                <span style="color:var(--muted);font-size:12px;">MACD·RSI·KDJ·布林·WR·ATR·OBV</span>
              </div>
              <div style="height:3px;background:rgba(255,255,255,0.06);margin:0;overflow:hidden;">
                <div style="height:100%;width:${(techScore/40*100).toFixed(0)}%;background:${dimColor(techScore,40)};transition:width 0.5s;"></div>
              </div>
              <div class="dimension-content">
                <div class="signal-tag-list">${buildSignalTags(techSignals)}</div>
                ${techSummary ? `<div class="dim-summary-text">${techSummary}</div>` : ''}
                
                <!-- 专业技术指标面板 -->
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;">
                  <div class="indicator-mini-card">
                    <div class="imc-label">RSI(14)</div>
                    <div class="imc-value" style="color:${rsiColor(rsi)};">${typeof rsi === 'number' ? rsi.toFixed(0) : rsi}</div>
                    <div class="imc-hint" style="color:${rsiColor(rsi)};">${rsi > 70 ? '超买' : rsi < 35 ? '超卖' : '健康'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">KDJ-J</div>
                    <div class="imc-value" style="color:${kdjColor(kdj_j)};">${typeof kdj_j === 'number' ? kdj_j.toFixed(0) : kdj_j}</div>
                    <div class="imc-hint" style="color:${kdjColor(kdj_j)};">${kdj_j > 90 ? '超买' : kdj_j < 10 ? '超卖' : `K/D ${typeof kdj_k==='number'?kdj_k.toFixed(0):kdj_k}/${typeof kdj_d==='number'?kdj_d.toFixed(0):kdj_d}`}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">威廉WR</div>
                    <div class="imc-value" style="color:${wrColor(wr)};">${typeof wr === 'number' ? wr.toFixed(0) : wr}</div>
                    <div class="imc-hint" style="color:${wrColor(wr)};">${wr > -20 ? '超买' : wr < -80 ? '超卖' : '中性'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">10日动量</div>
                    <div class="imc-value" style="color:${momColor(momentum10d)};">${momentum10d > 0 ? '+' : ''}${typeof momentum10d === 'number' ? momentum10d.toFixed(1) : momentum10d}%</div>
                    <div class="imc-hint" style="color:${momColor(momentum10d)};">${momentum10d > 8 ? '强势' : momentum10d < -8 ? '弱势' : '中性'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">MACD柱</div>
                    <div class="imc-value" style="color:${macd > 0 ? '#e63946' : '#2a9d8f'};">${typeof macd === 'number' ? (macd > 0 ? '+' : '') + macd.toFixed(3) : macd}</div>
                    <div class="imc-hint" style="color:${macd > 0 ? '#e63946' : '#2a9d8f'};">${macd > 0 ? '多头区' : '空头区'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">布林位置</div>
                    <div class="imc-value" style="color:${bollColor(bollPos)};">${typeof bollPos === 'number' ? bollPos.toFixed(0) : bollPos}%</div>
                    <div class="imc-hint" style="color:${bollColor(bollPos)};">${bollPos > 85 ? '上轨压力' : bollPos < 15 ? '下轨支撑' : bollWidth < 5 ? '收窄蓄势' : '中轨区'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">量比</div>
                    <div class="imc-value" style="color:${volRatio >= 2 ? '#e63946' : volRatio <= 0.5 ? '#8b949e' : '#e6edf3'};">${typeof volRatio === 'number' ? volRatio.toFixed(2) : volRatio}x</div>
                    <div class="imc-hint" style="color:var(--muted);">${volRatio >= 2 ? '放量' : volRatio <= 0.5 ? '萎缩' : '正常'}</div>
                  </div>
                  <div class="indicator-mini-card">
                    <div class="imc-label">OBV趋势</div>
                    <div class="imc-value" style="color:${obvTrend === '上升' ? '#e63946' : '#2a9d8f'};">${obvTrend === '上升' ? '↑上升' : obvTrend === '下降' ? '↓下降' : '--'}</div>
                    <div class="imc-hint" style="color:var(--muted);">成交${amountYi.toFixed(1)}亿</div>
                  </div>
                </div>
                
                <!-- MA均线和ATR -->
                <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
                  ${ma20 && ma20 !== '--' ? `<span style="font-size:11px;color:var(--muted);">MA20: <span style="color:${curPrice > ma20 ? '#e63946' : '#2a9d8f'};">¥${typeof ma20 === 'number' ? ma20.toFixed(2) : ma20}</span></span>` : ''}
                  ${ma60 && ma60 !== '--' ? `<span style="font-size:11px;color:var(--muted);">MA60: <span style="color:${curPrice > ma60 ? '#e63946' : '#2a9d8f'};">¥${typeof ma60 === 'number' ? ma60.toFixed(2) : ma60}</span></span>` : ''}
                  ${atr_pct > 0 ? `<span style="font-size:11px;color:var(--muted);">ATR波动率: <span style="color:${atr_pct > 4 ? '#e63946' : '#f0a500'};">${atr_pct.toFixed(1)}%</span></span>` : ''}
                  ${bollWidth > 0 ? `<span style="font-size:11px;color:var(--muted);">布林带宽: <span style="color:${bollWidth < 5 ? '#f79239' : 'var(--muted)'};">${bollWidth.toFixed(1)}%${bollWidth < 5 ? '(收窄蓄势)' : ''}</span></span>` : ''}
                </div>
              </div>
            </div>
            
            <!-- 基本面分析 -->
            <div class="dimension-section">
              <div class="dimension-header">
                <div class="dimension-title">
                  🏢 基本面分析
                  <span class="dim-score-chip" style="background:${dimColor(fundScore,25)}22;color:${dimColor(fundScore,25)};">${fundScore}/25</span>
                </div>
                <span style="color:var(--muted);font-size:12px;">PE·PB·ROE·毛利率·负债率·成长性</span>
              </div>
              <div style="height:3px;background:rgba(255,255,255,0.06);margin:0;overflow:hidden;">
                <div style="height:100%;width:${(fundScore/25*100).toFixed(0)}%;background:${dimColor(fundScore,25)};transition:width 0.5s;"></div>
              </div>
              <div class="dimension-content">
                <div class="signal-tag-list">${buildSignalTags(fundSignals)}</div>
                ${fundSummary ? `<div class="dim-summary-text">${fundSummary}</div>` : ''}
              </div>
            </div>
            
            <!-- 行业情报分析 -->
            <div class="dimension-section">
              <div class="dimension-header">
                <div class="dimension-title">
                  📰 行业情报分析
                  <span class="dim-score-chip" style="background:${dimColor(newsScore,35)}22;color:${dimColor(newsScore,35)};">${newsScore}/35</span>
                </div>
                <span style="color:var(--muted);font-size:12px;">${industry || '行业热度'}·公告情绪·资金流向</span>
              </div>
              <div style="height:3px;background:rgba(255,255,255,0.06);margin:0;overflow:hidden;">
                <div style="height:100%;width:${(newsScore/35*100).toFixed(0)}%;background:${dimColor(newsScore,35)};transition:width 0.5s;"></div>
              </div>
              <div class="dimension-content">
                <div class="signal-tag-list">${buildSignalTags(newsSignals)}</div>
                ${newsSummary ? `<div class="dim-summary-text">${newsSummary}</div>` : ''}
              </div>
            </div>
            
            <!-- 行业前景 -->
            ${industryOutlook ? `
            <div class="industry-outlook">
              <div class="outlook-title">🔭 行业前景展望${industry ? ' · ' + industry : ''}</div>
              ${industryOutlook}
            </div>` : ''}
            
            <!-- 交易计划 -->
            <div style="margin-bottom:18px;">
              <div style="font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;">
                💰 专业操作计划
                <span style="font-size:12px;font-weight:400;color:var(--muted);">盈亏比 ${rrRatio}:1</span>
                ${atr_pct > 0 ? `<span style="font-size:11px;color:var(--muted);">· ATR止损法</span>` : ''}
              </div>
              <div class="trade-plan-grid">
                <div class="trade-plan-item" style="border:1px solid rgba(42,157,143,0.3);">
                  <div class="tpi-label">推荐买入价</div>
                  <div class="tpi-value" style="color:var(--green);">¥${buyPrice.toFixed(2)}</div>
                  <div class="tpi-note">微高于当前价挂单</div>
                </div>
                <div class="trade-plan-item" style="border:1px solid rgba(230,57,70,0.3);">
                  <div class="tpi-label">止损价</div>
                  <div class="tpi-value" style="color:var(--red);">¥${stopLoss.toFixed(2)}</div>
                  <div class="tpi-note">最大亏损 -${lossPct}%${atr_pct > 0 ? ' (1.5×ATR)' : ''}</div>
                </div>
                <div class="trade-plan-item" style="border:1px solid rgba(247,146,57,0.3);">
                  <div class="tpi-label">目标价（止盈）</div>
                  <div class="tpi-value" style="color:var(--accent);">¥${takeProfit.toFixed(2)}</div>
                  <div class="tpi-note">预期涨幅 +${profitPct}%${atr_pct > 0 ? ` (${(rrRatio*1.5).toFixed(1)}×ATR)` : ''}</div>
                </div>
                <div class="trade-plan-item" style="border:1px solid rgba(255,255,255,0.1);">
                  <div class="tpi-label">建议仓位</div>
                  <div class="tpi-value">${Math.round((item.position_pct||0.08)*100)}%</div>
                  <div class="tpi-note">${strategyNote || '控制仓位分散风险'}</div>
                </div>
              </div>
            </div>
            
            <!-- 风险提示 -->
            <div class="risk-section">
              <div class="risk-title">⚠️ 风险提示</div>
              ${riskNotes.map(r => `<div class="risk-item">${r}</div>`).join('')}
            </div>
            
            <!-- 操作按钮 -->
            <div style="display:flex;gap:10px;margin-bottom:4px;">
              <button class="btn" style="flex:1;" onclick="doBuy('${code}','${name.replace(/'/g,"\\'")}',${item.suggested_shares||100},${buyPrice});document.getElementById('stock-detail-modal').remove();">
                买入 ${item.suggested_shares||100}股 (¥${((item.suggested_shares||100)*buyPrice).toFixed(0)})
              </button>
              <button class="btn btn-secondary" style="flex:0.4;" onclick="document.getElementById('stock-detail-modal').remove();">取消</button>
            </div>
            
            <div class="detail-disclaimer">⚠️ 以上分析基于量化模型，仅供模拟学习参考，不构成真实投资建议。股市有风险，投资需谨慎。</div>
          </div>
        </div>
      `;
      
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.remove();
      });
      document.body.appendChild(modal);
    }

    // 手动触发扫描（带轮询状态）
    function triggerScan() {
      if (!authToken) {
        toast('请先登录', 'error');
        window.location.href = '/login';
        return;
      }

      const btn = document.getElementById('btn-scan');
      if (btn) { btn.disabled = true; btn.textContent = '扫描中...'; }

      // 显示 loading 占位
      const grid = document.getElementById('stocks-grid');
      grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">🔍 全市场扫描中，约需1-3分钟，请稍候...</div>';
      
      toast('扫描已启动，正在获取全市场行情...', 'info');
      
      authFetch(`${API_BASE}/scan/trigger`, {
        method: 'POST'
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          toast('扫描进行中，约需1-3分钟，将自动刷新推荐...', 'info');
          updateScanStatus();
          
          // 开始轮询扫描状态，直到扫描完成
          let pollCount = 0;
          const maxPolls = 60; // 最多轮询60次（5分钟）
          const pollInterval = setInterval(() => {
            pollCount++;
            fetch(`${API_BASE}/scan/status`)
              .then(r => r.json())
              .then(statusData => {
                if (!statusData.running) {
                  // 扫描已完成
                  clearInterval(pollInterval);
                  loadSuggestions();
                  updateScanStatus();
                  toast('扫描完成！推荐已更新', 'success');
                  if (btn) { btn.disabled = false; btn.textContent = '手动扫描'; }
                } else if (pollCount >= maxPolls) {
                  clearInterval(pollInterval);
                  toast('扫描超时，请手动刷新推荐', 'error');
                  if (btn) { btn.disabled = false; btn.textContent = '手动扫描'; }
                }
              })
              .catch(() => {
                // 网络错误不停止轮询
              });
          }, 5000); // 每5秒轮询一次
          
        } else {
          toast(data.message || '扫描启动失败', 'error');
          loadSuggestions(); // 还原当前推荐
          if (btn) { btn.disabled = false; btn.textContent = '手动扫描'; }
        }
      })
      .catch(err => {
        console.error('扫描触发失败:', err);
        toast('扫描触发失败，请稍后重试', 'error');
        loadSuggestions(); // 还原当前推荐
        if (btn) { btn.disabled = false; btn.textContent = '手动扫描'; }
      });
    }

    // 页面加载
    window.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
